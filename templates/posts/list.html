{% extends 'base.html' %}

{% block 'title' %}
    posts 
{% endblock %}

{% block content %}
    <h1>{{ post_status }} post</h1>
    <div>
        <ul>
            {% for post in posts  %}
            <li>{{post.id}} - {{post.title}}</li><br>
            <span><strong>Status: {{ post.status }}</strong></span> <br>
            <a href="{% url 'post_detail' post.id %}">Continue Reading</a>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
